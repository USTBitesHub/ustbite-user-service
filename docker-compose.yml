version: '3.8'

services:
  app:
    build: .
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - default

  db-migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ustbite_users_db
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:alpine
    ports:
      - "6379"
    networks:
      - default

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672"
      - "15672"
    networks:
      - default

networks:
  default:
    name: ustbite-ustbite-user-service-network
